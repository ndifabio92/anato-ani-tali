<div class="max-w-4xl mx-auto py-10 px-4">
    <div class="text-center mb-10">
        <h2 class="text-3xl md:text-4xl font-bold text-primary mb-3">
            Preguntas Frecuentes
        </h2>
        <p class="text-neutral/80 text-lg">
            Resolvemos tus dudas principales sobre el curso
        </p>
    </div>

    <div class="flex flex-col gap-4">
        @for (faq of faqs; track faq.question; let isFirst = $first) {
        <div class="collapse collapse-plus bg-base-200 shadow-sm transition-all hover:shadow-md">
            <input type="radio" name="faq-accordion" [checked]="isFirst" />

            <div class="collapse-title text-lg md:text-xl font-semibold text-neutral">
                {{ faq.question }}
            </div>

            <div class="collapse-content text-base-content/90 leading-relaxed">
                <p>{{ faq.answer }}</p>
            </div>
        </div>
        }
    </div>
</div>
