<div class="bg-base-100 py-12">
    <div class="max-w-4xl mx-auto px-6 text-center">
        <h3 class="text-2xl font-bold text-primary mb-8">{{'Medios de pago aceptados' | titlecase}}</h3>
        <div class="card grid grid-cols-1 md:grid-cols-3 gap-6">
            @for (method of methods(); track method.id) {
            <div class="card-body flex flex-col items-center p-6 bg-white  rounded-2xl border border-accent">
                <div class="text-primary mb-3 inline-flex [&_svg]:block" [innerHTML]="iconPaths[method.method]"></div>
                <span class="font-bold">{{method.label}}</span>
            </div>
            }
        </div>
    </div>
</div>
