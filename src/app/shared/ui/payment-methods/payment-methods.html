<div class="w-full">
  <div class="bg-white/80 p-4 border border-base-200 rounded-lg w-full mt-5">
    <div class="mx-auto text-center">
      <h3 class="text-xl md:text-2xl font-semibold italic text-primary mb-1">
        {{'Medios de pago aceptados' | titlecase}}
      </h3>
      <div class="flex flex-wrap justify-center gap-x-4 gap-y-2">
        @for (method of methods(); track method.id) {
        <div class="flex gap-1.5 items-center">
          <span class="material-symbols-outlined text-primary">{{iconClass[method.method]}}</span>
          <span class="font-light text-card-text">{{method.label}}</span>
        </div>
        }
      </div>
    </div>
  </div>
</div>
